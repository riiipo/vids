<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jiko · Stablecoins, Made Profitable</title>
<link rel="stylesheet" href="brand.css">
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #FFFFFF; }
  #root { position: fixed; inset: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="lib.jsx"></script>
<script type="text/babel" src="scenes-a.jsx"></script>
<script type="text/babel" src="scenes-b.jsx"></script>
<script type="text/babel" src="scenes-c.jsx"></script>
<script type="text/babel" src="scenes-d.jsx"></script>

<script type="text/babel" data-presets="react">
const DURATION = 184;

function SeekBridge() {
  const { setTime, setPlaying } = useTimeline();
  React.useEffect(() => {
    window.__seek = (t) => { setPlaying(false); setTime(t); };
    window.__play = () => setPlaying(true);
    window.__renderReady = true;
  }, [setTime, setPlaying]);
  return null;
}

function Scenes() {
  return (
    <React.Fragment>
      <Scene1/><Scene2/><Scene3/><Scene4/>
      <Scene5/><Scene6/><Scene7/><Scene8/>
      <Scene9/><Scene10/><Scene11/>
      <Scene12/><Scene13/><Scene14/>
    </React.Fragment>
  );
}

function App() {
  return (
    <Stage width={1920} height={1080} duration={DURATION} background="#FFFFFF" persistKey="jiko-render" fps={60}>
      <BackgroundDirector/>
      <Scenes/>
      <Chrome darkRanges={DARK_RANGES}/>
      <SeekBridge/>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
